apiVersion: apps/v1
kind: Deployment
metadata:
  name: ebloved
  namespace: ebloved
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ebloved
  template:
    metadata:
      labels:
        app: ebloved
    spec:
      containers:
        - name: ebloved
          image: ghcr.io/georgeipsum/ebloved:sha-c641983
          ports:
            - containerPort: 4000
          env:
            - name: PHX_HOST
              value: ebloved.com
            - name: PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ebloved-db-app
                  key: uri
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: ebloved-env
                  key: SECRET_KEY_BASE
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
