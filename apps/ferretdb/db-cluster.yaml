apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ferretdb-db
  namespace: ferretdb
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  imageName: ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0
  postgresUID: 999
  postgresGID: 999
  enableSuperuserAccess: true
  storage:
    size: 10Gi
    storageClass: local-path
  postgresql:
    shared_preload_libraries:
      - pg_cron
      - pg_documentdb_core
      - pg_documentdb
    parameters:
      cron.database_name: "postgres"
    # DocumentDB (and pg_cron) open internal libpq self-connections to
    # localhost — e.g. documentdb_api_internal.index_build_is_in_progress
    # during count() on an indexed collection. CNPG's managed pg_hba requires
    # auth for host connections, so those self-connections fail with
    # "fe_sendauth: no password supplied". Trust localhost (single non-exposed
    # pod; only in-pod processes can originate these) to allow them.
    pg_hba:
      - host all all 127.0.0.1/32 trust
      - host all all ::1/128 trust
  bootstrap:
    initdb:
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS documentdb CASCADE;
